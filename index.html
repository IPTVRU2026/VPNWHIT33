<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Белый Болт Advanced - VPN Scanner с SNI/CIDR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: linear-gradient(135deg, rgba(88,166,255,0.2), rgba(248,81,73,0.2));
            border-radius: 12px;
            border: 2px solid rgba(88,166,255,0.4);
        }
        .title { font-size: 2.3rem; font-weight: 800; color: #58a6ff; margin-bottom: 8px; }
        .subtitle { color: #8b949e; font-size: 0.95rem; }
        .panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 22px;
            margin-bottom: 20px;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 12px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #c9d1d9;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88,166,255,0.2);
        }
        textarea { min-height: 120px; resize: vertical; }
        
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary { background: transparent; border: 1px solid #58a6ff; color: #58a6ff; }
        .btn-secondary:hover { background: rgba(88,166,255,0.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .log-panel {
            max-height: 350px;
            overflow-y: auto;
            background: #0d1117;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border-radius: 6px;
            border: 1px solid #30363d;
            margin: 15px 0;
        }
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #21262d;
        }
        .log-info { color: #58a6ff; }
        .log-success { color: #3fb950; }
        .log-error { color: #f85149; }
        .log-warning { color: #daaa0f; }
        
        .progress-bar {
            height: 6px;
            background-color: #21262d;
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #3fb950);
            width: 0%;
            transition: width 0.3s;
        }
        
        .filter-box {
            background: rgba(88,166,255,0.05);
            border: 1px solid rgba(88,166,255,0.2);
            border-radius: 6px;
            padding: 12px;
            margin: 15px 0;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .filter-item:last-child { margin-bottom: 0; }
        .filter-item input { width: auto; }
        
        .result-item {
            background: #0d1117;
            border-left: 3px solid #30363d;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .result-item.success { border-left-color: #3fb950; }
        .result-item.failed { border-left-color: #f85149; }
        .result-item.partial { border-left-color: #daaa0f; }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge-sni { background: rgba(88,166,255,0.2); color: #58a6ff; }
        .badge-dns { background: rgba(63,185,80,0.2); color: #3fb950; }
        .badge-tls { background: rgba(218,170,15,0.2); color: #daaa0f; }
        
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .alert {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 3px solid;
            font-size: 0.9rem;
        }
        .alert-info { background: rgba(88,166,255,0.1); border-color: #58a6ff; color: #58a6ff; }
        .alert-warning { background: rgba(218,170,15,0.1); border-color: #daaa0f; color: #daaa0f; }
        .alert-error { background: rgba(248,81,73,0.1); border-color: #f85149; color: #f85149; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        @media (max-width: 600px) { .stats { grid-template-columns: repeat(2, 1fr); } }
        
        .stat-box {
            background: #0d1117;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            text-align: center;
        }
        .stat-number { font-size: 1.5rem; font-weight: 800; color: #58a6ff; }
        .stat-label { font-size: 0.8rem; color: #8b949e; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">

<header>
    <h1 class="title">⚡ Белый Болт Advanced</h1>
    <p class="subtitle">Продвинутый сканер VPN конфигов с проверкой SNI, CIDR и TLS</p>
</header>

<div class="panel">
    <h2 style="margin-bottom: 15px;"><i class="fas fa-cogs"></i> Настройки</h2>
    
    <div class="grid-2">
        <div>
            <div class="form-group">
                <label><i class="fas fa-cube"></i> Конфигурации (vless/vmess/ss)</label>
                <textarea id="configsInput" placeholder="vless://...
vmess://...
ss://..."></textarea>
            </div>
        </div>
        
        <div>
            <div class="form-group">
                <label><i class="fas fa-check"></i> SNI для проверки (опционально)</label>
                <input id="sniFilter" placeholder="example.com (или оставьте пустым)">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-network-wired"></i> CIDR фильтр (опционально)</label>
                <input id="cidrFilter" placeholder="192.168.0.0/16 (проверит только IP в этом диапазоне)">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-hourglass-half"></i> Таймаут (мс)</label>
                <input id="timeout" type="number" value="6000" min="1000" max="30000">
            </div>
        </div>
    </div>
    
    <div class="filter-box">
        <h3 style="margin-bottom: 10px; font-size: 0.95rem;"><i class="fas fa-filter"></i> Методы проверки</h3>
        <div class="filter-item">
            <input type="checkbox" id="checkDNS" checked>
            <label for="checkDNS">🔍 Проверка DNS (Cloudflare, Google, Xbox-DNS)</label>
        </div>
        <div class="filter-item">
            <input type="checkbox" id="checkTLS" checked>
            <label for="checkTLS">🔐 Проверка TLS/SSL рукопожатия с SNI</label>
        </div>
        <div class="filter-item">
            <input type="checkbox" id="checkHTTP" checked>
            <label for="checkHTTP">🌐 Проверка HTTP доступности</label>
        </div>
        <div class="filter-item">
            <input type="checkbox" id="fastMode" checked>
            <label for="fastMode">⚡ Быстрый режим (параллельные проверки)</label>
        </div>
    </div>
    
    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
        <button class="btn btn-primary" onclick="startScan()" id="startBtn">
            <i class="fas fa-play"></i> Начать сканирование
        </button>
        <button class="btn btn-secondary" onclick="resetAll()">
            <i class="fas fa-redo"></i> Сброс
        </button>
        <button class="btn btn-secondary" onclick="copyResults()">
            <i class="fas fa-copy"></i> Копировать рабочие
        </button>
        <button class="btn btn-secondary" onclick="downloadResults()">
            <i class="fas fa-download"></i> Скачать
        </button>
    </div>
</div>

<div class="panel">
    <h2 style="margin-bottom: 10px;"><i class="fas fa-terminal"></i> Лог сканирования</h2>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span id="progressText" style="font-size: 0.9rem; color: #8b949e;">Готов к работе</span>
        <span id="scanStats" style="font-size: 0.85rem; color: #6e7681;"></span>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="logPanel" class="log-panel"></div>
</div>

<div class="panel" id="resultsPanel" style="display: none;">
    <h2 style="margin-bottom: 15px;"><i class="fas fa-list-check"></i> Результаты</h2>
    
    <div class="stats">
        <div class="stat-box">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Всего</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" style="color: #3fb950;" id="statWorking">0</div>
            <div class="stat-label">Рабочих</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" style="color: #daaa0f;" id="statPartial">0</div>
            <div class="stat-label">Частичные</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" style="color: #f85149;" id="statFailed">0</div>
            <div class="stat-label">Неработающих</div>
        </div>
    </div>
    
    <div id="resultsContainer" style="max-height: 500px; overflow-y: auto;"></div>
</div>

</div>

<script>
// ===== КОНСТАНТЫ И СОСТОЯНИЕ =====
let allResults = [];
let isScanning = false;

const logPanel = document.getElementById('logPanel');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const startBtn = document.getElementById('startBtn');

// ===== ЛОГИРОВАНИЕ =====
function addLog(msg, type = 'info') {
    const div = document.createElement('div');
    div.className = `log-entry log-${type}`;
    const time = new Date().toLocaleTimeString();
    div.innerHTML = `<span style="color:#6e7681;">[${time}]</span> ${msg}`;
    logPanel.appendChild(div);
    logPanel.scrollTop = logPanel.scrollHeight;
}

function updateProgress(percent, text) {
    progressFill.style.width = Math.min(percent, 100) + '%';
    progressText.textContent = text;
}

// ===== ПАРСИНГ И УТИЛИТЫ =====

function extractDomainFromConfig(config) {
    // vless://user@example.com:443?xxx
    // vmess://xxx@example.com:443?xxx
    // ss://xxx@example.com:443?xxx
    
    let match = config.match(/@([a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9]):(\d+)/);
    if (match) {
        return {
            domain: match[1],
            port: parseInt(match[2]),
            protocol: config.split('://')[0]
        };
    }
    
    match = config.match(/@([a-zA-Z0-9][a-zA-Z0-9.-]*[a-zA-Z0-9])(?:[?/#]|$)/);
    if (match) {
        return {
            domain: match[1],
            port: 443,
            protocol: config.split('://')[0]
        };
    }
    
    return null;
}

function ipToNumber(ip) {
    const parts = ip.split('.');
    return (parts[0] << 24) + (parts[1] << 16) + (parts[2] << 8) + parseInt(parts[3]);
}

function numberToIp(num) {
    return [(num >>> 24) & 0xFF, (num >>> 16) & 0xFF, (num >>> 8) & 0xFF, num & 0xFF].join('.');
}

function isIPInCIDR(ip, cidr) {
    const [network, bits] = cidr.split('/');
    if (!network || !bits) return false;
    
    const networkNum = ipToNumber(network);
    const mask = (0xFFFFFFFF << (32 - parseInt(bits))) >>> 0;
    const ipNum = ipToNumber(ip);
    
    return (ipNum & mask) === (networkNum & mask);
}

// ===== DNS ПРОВЕРКИ =====

async function checkDNS_Cloudflare(domain) {
    try {
        const response = await fetch(
            `https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=A`,
            { 
                headers: { 'Accept': 'application/dns-json' },
                signal: AbortSignal.timeout(4000)
            }
        );
        const data = await response.json();
        if (data.Answer && data.Answer.length > 0) {
            return { success: true, ips: data.Answer.map(a => a.data).join(', ') };
        }
        return { success: false };
    } catch (e) {
        return { success: false };
    }
}

async function checkDNS_Google(domain) {
    try {
        const response = await fetch(
            `https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=A`,
            { signal: AbortSignal.timeout(4000) }
        );
        const data = await response.json();
        if (data.Answer && data.Answer.length > 0) {
            return { success: true, ips: data.Answer.map(a => a.data).join(', ') };
        }
        return { success: false };
    } catch (e) {
        return { success: false };
    }
}

async function checkDNS(domain) {
    if (!document.getElementById('checkDNS').checked) return null;
    
    const cf = await checkDNS_Cloudflare(domain);
    if (cf.success) return cf;
    
    const gg = await checkDNS_Google(domain);
    if (gg.success) return gg;
    
    return { success: false };
}

// ===== TLS/SNI ПРОВЕРКА =====

async function checkTLS(domain, port = 443) {
    if (!document.getElementById('checkTLS').checked) return null;
    
    return new Promise((resolve) => {
        const timeout = setTimeout(() => {
            resolve({ success: false, error: 'timeout' });
        }, 5000);
        
        try {
            const ws = new WebSocket(`wss://${domain}:${port}`);
            
            ws.onopen = () => {
                clearTimeout(timeout);
                ws.close();
                resolve({ success: true, sni: domain });
            };
            
            ws.onerror = () => {
                clearTimeout(timeout);
                resolve({ success: false, error: 'ws_error' });
            };
        } catch (e) {
            clearTimeout(timeout);
            resolve({ success: false, error: 'exception' });
        }
    });
}

// ===== HTTP ПРОВЕРКА =====

async function checkHTTP(domain, port = 443) {
    if (!document.getElementById('checkHTTP').checked) return null;
    
    try {
        const protocol = port === 443 || port === 8443 ? 'https' : 'http';
        const response = await fetch(`${protocol}://${domain}:${port}/`, {
            method: 'HEAD',
            signal: AbortSignal.timeout(4000)
        });
        return { success: response.ok };
    } catch (e) {
        return { success: false, error: e.message };
    }
}

// ===== ОСНОВНАЯ ПРОВЕРКА =====

async function checkConfig(config) {
    const info = extractDomainFromConfig(config);
    
    if (!info) {
        return {
            config: config.substring(0, 60) + '...',
            working: false,
            error: 'Parse error'
        };
    }
    
    const { domain, port, protocol } = info;
    
    const dnsResult = await checkDNS(domain);
    const tlsResult = await checkTLS(domain, port);
    const httpResult = await checkHTTP(domain, port);
    
    const dnsOK = dnsResult?.success || false;
    const tlsOK = tlsResult?.success || false;
    const httpOK = httpResult?.success || false;
    
    const working = dnsOK && (tlsOK || httpOK);
    const partial = dnsOK && !tlsOK && !httpOK;
    
    return {
        config: config.substring(0, 70) + (config.length > 70 ? '...' : ''),
        domain,
        port,
        protocol,
        working,
        partial,
        dns: dnsOK,
        tls: tlsOK,
        http: httpOK,
        ips: dnsResult?.ips
    };
}

// ===== ФИЛЬТРАЦИЯ =====

function passesFilters(result) {
    const sniFilter = document.getElementById('sniFilter').value.trim();
    const cidrFilter = document.getElementById('cidrFilter').value.trim();
    
    // SNI фильтр
    if (sniFilter && !result.domain.includes(sniFilter)) {
        return false;
    }
    
    // CIDR фильтр
    if (cidrFilter) {
        // Если у нас есть IP адреса из DNS
        if (result.ips) {
            const ips = result.ips.split(', ');
            const matches = ips.some(ip => isIPInCIDR(ip.trim(), cidrFilter));
            if (!matches) return false;
        } else if (result.dns) {
            // Если DNS успешен, но нет IP - может быть IPv6 или другая проблема
            return false;
        }
    }
    
    return true;
}

// ===== ГЛАВНАЯ ФУНКЦИЯ СКАНИРОВАНИЯ =====

async function startScan() {
    if (isScanning) return;
    isScanning = true;
    startBtn.disabled = true;
    startBtn.innerHTML = '<span class="spinner"></span> Сканирование...';
    
    logPanel.innerHTML = '';
    allResults = [];
    updateProgress(0, 'Инициализация...');
    
    try {
        const configText = document.getElementById('configsInput').value.trim();
        if (!configText) throw new Error('Вставьте конфигурации');
        
        let configs = configText.split('\n')
            .map(c => c.trim())
            .filter(c => c && !c.startsWith('#') && (c.startsWith('vless://') || c.startsWith('vmess://') || c.startsWith('ss://')));
        
        if (configs.length === 0) throw new Error('Не найдено валидных конфигураций');
        
        // Удаляем дубликаты
        configs = [...new Set(configs)];
        
        addLog(`📊 Загружено конфигураций: ${configs.length}`, 'success');
        
        const fastMode = document.getElementById('fastMode').checked;
        
        if (fastMode) {
            // Параллельная проверка
            const batchSize = 5;
            for (let i = 0; i < configs.length; i += batchSize) {
                const batch = configs.slice(i, i + batchSize);
                const promises = batch.map(cfg => checkConfig(cfg));
                const batchResults = await Promise.all(promises);
                
                allResults.push(...batchResults);
                
                const percent = Math.round((i / configs.length) * 100);
                updateProgress(percent, `${allResults.length}/${configs.length}`);
                
                for (const result of batchResults) {
                    if (result.working) {
                        addLog(`✅ ${result.domain}:${result.port}`, 'success');
                    } else if (result.partial) {
                        addLog(`⚠️ ${result.domain}:${result.port} (частичная доступность)`, 'warning');
                    }
                }
            }
        } else {
            // Последовательная проверка
            for (let i = 0; i < configs.length; i++) {
                const result = await checkConfig(configs[i]);
                allResults.push(result);
                
                const percent = Math.round((i / configs.length) * 100);
                updateProgress(percent, `${i + 1}/${configs.length}`);
                
                if (result.working) {
                    addLog(`✅ ${result.domain}:${result.port}`, 'success');
                } else if (result.partial) {
                    addLog(`⚠️ ${result.domain}:${result.port}`, 'warning');
                }
            }
        }
        
        updateProgress(100, 'Обработка результатов...');
        showResults();
        addLog(`🎉 Сканирование завершено`, 'success');
        
    } catch (error) {
        addLog(`❌ Ошибка: ${error.message}`, 'error');
        updateProgress(100, 'Ошибка');
    }
    
    startBtn.disabled = false;
    startBtn.innerHTML = '<i class="fas fa-play"></i> Начать сканирование';
    isScanning = false;
}

// ===== ОТОБРАЖЕНИЕ РЕЗУЛЬТАТОВ =====

function showResults() {
    const panel = document.getElementById('resultsPanel');
    const container = document.getElementById('resultsContainer');
    
    const filtered = allResults.filter(passesFilters);
    const working = filtered.filter(r => r.working);
    const partial = filtered.filter(r => r.partial && !r.working);
    const failed = filtered.filter(r => !r.working && !r.partial);
    
    document.getElementById('statTotal').textContent = filtered.length;
    document.getElementById('statWorking').textContent = working.length;
    document.getElementById('statPartial').textContent = partial.length;
    document.getElementById('statFailed').textContent = failed.length;
    
    if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: #8b949e;">😔 Нет результатов, соответствующих фильтрам</div>';
        panel.style.display = 'block';
        return;
    }
    
    const html = [
        ...working.map((r, i) => renderResult(r, 'success', i + 1)),
        ...partial.map((r, i) => renderResult(r, 'partial', i + working.length + 1)),
        ...failed.map((r, i) => renderResult(r, 'failed', i + working.length + partial.length + 1))
    ].join('');
    
    container.innerHTML = html;
    panel.style.display = 'block';
}

function renderResult(r, status, idx) {
    const statusIcon = status === 'success' ? '✅' : (status === 'partial' ? '⚠️' : '❌');
    const statusText = status === 'success' ? 'Рабочий' : (status === 'partial' ? 'Частичный' : 'Неработающий');
    
    let badges = '';
    if (r.dns) badges += ' <span class="badge badge-dns">DNS ✓</span>';
    if (r.tls) badges += ' <span class="badge badge-tls">TLS ✓</span>';
    if (r.http) badges += ' <span class="badge badge-tls">HTTP ✓</span>';
    
    return `
        <div class="result-item ${status}">
            <div><strong>${idx}.</strong> <code>${escapeHtml(r.config)}</code> ${statusIcon} ${statusText}${badges}</div>
            <div style="margin-top: 6px; font-size: 0.8rem; color: #8b949e;">
                <i class="fas fa-server"></i> ${r.domain}:${r.port} (${r.protocol})
                ${r.ips ? ` | IP: ${r.ips}` : ''}
            </div>
        </div>
    `;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ===== ДЕЙСТВИЯ =====

function copyResults() {
    const working = allResults.filter(r => r.working && passesFilters(r));
    if (working.length === 0) {
        addLog('⚠️ Нет рабочих конфигов для копирования', 'warning');
        return;
    }
    
    const text = working.map(r => {
        const match = document.querySelector(`code:contains("${r.config}")`);
        return allResults.find(a => a.config === r.config)?.config || r.config;
    }).join('\n');
    
    navigator.clipboard.writeText(text).then(() => {
        addLog(`📋 Скопировано ${working.length} конфигов`, 'success');
    });
}

function downloadResults() {
    const working = allResults.filter(r => r.working && passesFilters(r));
    if (working.length === 0) {
        addLog('⚠️ Нет рабочих конфигов для скачивания', 'warning');
        return;
    }
    
    // Находим оригинальные конфиги
    const configs = document.getElementById('configsInput').value.split('\n')
        .filter(c => c.trim() && !c.startsWith('#'));
    
    const text = working.map(r => {
        const original = configs.find(cfg => cfg.includes(r.domain));
        return original || r.config;
    }).join('\n');
    
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `configs_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    
    addLog(`💾 Скачано ${working.length} конфигов`, 'success');
}

function resetAll() {
    if (isScanning) return;
    document.getElementById('configsInput').value = '';
    document.getElementById('sniFilter').value = '';
    document.getElementById('cidrFilter').value = '';
    logPanel.innerHTML = '';
    updateProgress(0, 'Готов к работе');
    document.getElementById('resultsPanel').style.display = 'none';
    allResults = [];
    addLog('🔄 Сброс выполнен', 'info');
}

// Инициализация
document.addEventListener('DOMContentLoaded', () => {
    addLog('✅ Сканер готов', 'success');
    addLog('💡 Вставьте конфигурации и нажмите "Начать сканирование"', 'info');
});
</script>
