<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Русский Белый Болт - Сканер лучших конфигураций</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(88,166,255,0.15), rgba(36,161,222,0.15));
            border-radius: 15px;
            border: 2px solid rgba(88,166,255,0.3);
        }
        .title { font-size: 2.5rem; font-weight: 800; color: #58a6ff; margin-bottom: 10px; }
        .subtitle { color: #8b949e; }
        .panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-primary { background: #238636; color: white; }
        .btn-secondary { background: transparent; border: 1px solid #58a6ff; color: #58a6ff; }

        .status-panel, .results-panel { display: none; }
        .active { display: block; }

        .log-panel {
            max-height: 250px;
            overflow-y: auto;
            background: #0d1117;
            padding: 10px;
            font-family: monospace;
        }
    </style>
</head>

<body>

<script>
    window.GITVERSE_TOKEN = "__GITVERSE_TOKEN__";
</script>

<div class="container">

<header>
    <h1 class="title">⚡ Русский Белый Болт</h1>
    <p class="subtitle">Сканер конфигов</p>
</header>

<div class="panel">
    <label>Репозиторий</label>
    <input id="repoOwner" value="RUVIPIEN" readonly>

    <label>Название</label>
    <input id="repoName" value="russian-white-bolt" readonly>

    <label>Папка</label>
    <input id="folderPath" value="VPNMIRRORS">

    <label>Timeout</label>
    <input id="timeout" value="5000">

    <br><br>

    <button class="btn btn-primary" onclick="startScan()">Старт</button>
    <button class="btn btn-secondary" onclick="resetForm()">Сброс</button>
</div>

<div id="statusPanel" class="panel status-panel active">
    <div>Логи:</div>
    <div id="logPanel" class="log-panel"></div>
</div>

<div id="resultsPanel" class="panel results-panel">
    <h3>Результаты</h3>
    <div id="results"></div>
</div>

</div>

<script>
const GV_TOKEN = window.GITVERSE_TOKEN;
const GV_BASE = "https://gitverse.ru/api/v1";

let allConfigs = [];
let workingConfigs = [];

const logPanel = document.getElementById('logPanel');

function log(msg){
    const div = document.createElement('div');
    div.textContent = msg;
    logPanel.appendChild(div);
}

async function gvFetch(url){
    return fetch(url, {
        headers: { Authorization: `token ${GV_TOKEN}` }
    });
}

async function startScan(){
    logPanel.innerHTML = '';

    const owner = document.getElementById('repoOwner').value;
    const repo = document.getElementById('repoName').value;
    const folder = document.getElementById('folderPath').value;

    log("Подключение к GitVerse...");

    const files = await getFiles(owner, repo, folder);

    log("Файлов найдено: " + files.length);

    for(const file of files){
        try{
            const res = await gvFetch(file.url);
            const text = await res.text();

            const configs = text.split("\n").filter(Boolean);

            configs.forEach(c=>{
                allConfigs.push(c);
            });

            log("Файл обработан: " + file.name);
        } catch(e){
            log("Ошибка: " + file.name);
        }
    }

    log("Всего конфигов: " + allConfigs.length);

    workingConfigs = allConfigs.slice(0,10); // упрощённая проверка

    showResults();
}

async function getFiles(owner, repo, folder){
    const url = `${GV_BASE}/repos/${owner}/${repo}/contents/${folder}`;
    const res = await gvFetch(url);
    const items = await res.json();

    let files = [];

    for(const item of items){
        if(item.type === "file"){
            files.push(item);
        }
        if(item.type === "dir"){
            const sub = await getFiles(owner, repo, item.path);
            files = files.concat(sub);
        }
    }

    return files;
}

function showResults(){
    const panel = document.getElementById('resultsPanel');
    const resDiv = document.getElementById('results');

    panel.classList.add('active');

    resDiv.innerHTML = workingConfigs.map(c=>`<div>${c}</div>`).join('');
}

function resetForm(){
    allConfigs = [];
    workingConfigs = [];
    logPanel.innerHTML = '';
}
</script>

</body>
</html>
