name: 🚀 Deploy Site & Update README

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔑 Настройка git авторизации
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/${{ github.repository }}.git

      - name: 🌐 Deploy to GitVerse Pages (gh-pages)
        run: |
          mkdir -p /tmp/gh-pages-deploy
          cp -r . /tmp/gh-pages-deploy/
          rm -rf /tmp/gh-pages-deploy/.git

          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          git rm -rf . --quiet 2>/dev/null || true
          cp -r /tmp/gh-pages-deploy/. .

          git add -A
          git diff --cached --quiet || git commit -m "deploy: обновление сайта [skip ci]"
          git push origin gh-pages --force

          git checkout main

      - name: 📝 Обновить README с ссылкой на сайт
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SITE_URL="https://${OWNER}.gitverse.ru/${REPO}/"

          if grep -q "<!-- SITE_BADGE -->" README.md 2>/dev/null; then
            sed -i "s|<!-- SITE_BADGE -->.*<!-- /SITE_BADGE -->|<!-- SITE_BADGE --> [![🌐 Открыть сайт](https://img.shields.io/badge/Site-GitVerse-blue)](${SITE_URL}) <!-- /SITE_BADGE -->|g" README.md
          else
            { echo "<!-- SITE_BADGE --> [![🌐 Открыть сайт](https://img.shields.io/badge/Site-GitVerse-blue)](${SITE_URL}) <!-- /SITE_BADGE -->"; echo ""; cat README.md; } > README.tmp
            mv README.tmp README.md
          fi

          echo "Site URL: ${SITE_URL}"

      - name: 🔧 Обновить ссылку в readme_generate.py
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SITE_URL="https://${OWNER}.gitverse.ru/${REPO}/"

          if [ -f readme_generate.py ]; then
            if grep -q "^SITE_URL" readme_generate.py; then
              sed -i "s|^SITE_URL.*|SITE_URL = \"${SITE_URL}\"  # auto-updated by CI|" readme_generate.py
            else
              { echo "SITE_URL = \"${SITE_URL}\"  # auto-updated by CI"; echo ""; cat readme_generate.py; } > readme_generate.tmp
              mv readme_generate.tmp readme_generate.py
            fi
          fi

      - name: 💾 Commit изменений в main
        run: |
          git add README.md readme_generate.py 2>/dev/null || true
          git diff --cached --quiet || git commit -m "ci: обновлена ссылка на сайт GitVerse Pages [skip ci]"
          git push origin main
